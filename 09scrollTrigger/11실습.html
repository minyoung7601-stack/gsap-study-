<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실습</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      body {
        height: 3000px;
      }
      .box1 {
        width: 100px;
        height: 100px;
        background-color: orange;
        margin: 500px auto 0px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>

    <script>
      gsap.to(".box1", {
        rotation: 360,
        scale: 2,
        duration: 1,
        scrollTrigger: {
          trigger: ".box1",
          start: "top center",
          scrub: 3,
          once: true,
          markers: true,
        },
      });
    </script>
  </body>
</html>
