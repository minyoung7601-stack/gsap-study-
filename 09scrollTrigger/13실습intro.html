<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실습intro</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }
      body {
        height: 3000px;
        background-color: #000;
        color: #fff;
      }
      .title {
        font-size: 4rem;
        text-align: center;
        font-weight: bold;
        margin-top: 100px;
      }
      .short {
        text-align: center;
        margin: 200px 0px;
        transform: translateY(100px) scale(0.5);
        opacity: 0;
      }
      .intro {
        width: 800px;
        border: 1px solid red;
        margin: 200px auto;
        padding: 40px;
        background-color: #fff;
        color: #000;
        border-radius: 1rem;
        transform: translateX(-100px);
        opacity: 0;
      }
      .intro p {
        margin-top: 2rem;
        line-height: 1.7rem;
      }
    </style>
  </head>
  <body>
    <div class="title">
      숏폼을 가장 잘 알고 <br />
      가장 잘 실행합니다
    </div>
    <div class="short">
      <img src="https://shortt.kr/asset/img/main/s1_trophy.png" alt="" />
    </div>
    <section class="intro">
      <h2>마침내 다가온 숏폼의 시대</h2>
      <p>
        숏폼을 가장 잘 알고 가장 잘 실행합니다<br />
        오직 숏폼 마케팅만을 치열하게 고민해 왔기 때문입니다.
      </p>
    </section>

    <script>
      // 1. 아래에서 위로 올라오며 나타나게
      gsap.to(".short", {
        y: 0,
        scale: 1,
        opacity: 1,
        duration: 1.2,
        ease: "power3.out",
        delay: 0.2,
      });
      //2.새로고침하면 intro 화면이 나오게
      gsap.to(".intro", {
        x: 0,
        opacity: 1,
        scrollTrigger: {
          trigger: ".intro",
          start: "top center",
          markers: true,
        },
      });
    </script>
  </body>
</html>
