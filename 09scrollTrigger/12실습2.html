<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>실습2</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      body {
        height: 3000px; /*트리거지점까지 올라오기 위해 ㅇ스크롤 여유공간*/
      }
      .box1 {
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 500px auto 0px;
      }
      .box2 {
        width: 100px;
        height: 100px;
        background-color: green;
        margin: 500px auto 0px;
      }
      .box3 {
        width: 100px;
        height: 100px;
        background-color: blue;
        margin: 500px auto 0px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <script>
      //회전
      // gsap.to(".box1", {
      //   rotation: 360,
      //   duration: 1,
      //   scrollTrigger: {
      //     trigger: ".box1",
      //     start: "top center",
      //     end: "bottom center",
      //     scrub: 3, // 스크롤 속도에 맞춰 애니메이션이 동기화.
      //     markers: true, //화면에 시작점과 끝점을 보여주는 가이드 라인
      //   },
      // });

      //회전
      gsap.to(".box1", {
        rotation: 360,
        scrollTrigger: {
          trigger: ".box1",
          start: "top 80%",
          scrub: 2, // 스크롤 속도에 맞춰 애니메이션이 '3초'동안 부드럽게 스르륵 따라오도록
          // markers: true, //다음 크기조절을 테스트할때는 주석으로 지워준다. 헷갈리지 않기 위해
        },
      });

      //크기조절
      gsap.to(".box2", {
        scale: 2,
        duration: 1,
        scrollTrigger: {
          trigger: ".box2",

          start: "top 70%",
          // end: "bottom center",
          scrub: 3,
          makers: true,
        },
      });

      //오른쪽으로 이동
      gsap.to(".box3", {
        x: 300,
        scrollTrigger: {
          trigger: ".box3",
          start: "top 60%",
          // end: "bottom center",
          scrub: 2,
          markers: true,
        },
      });
    </script>
  </body>
</html>
