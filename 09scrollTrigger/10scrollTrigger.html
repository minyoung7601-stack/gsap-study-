<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>scrollTrigger</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul {
        list-style: none;
      }
      body {
        height: 2000px;
      }
      .box {
        width: 100px;
        height: 100px;
        padding: 20px;
        background-color: orange;
        margin: 600px auto 0px;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>

    <script>
      gsap.to(".box", {
        y: -300,
        duration: 2,
        scrollTrigger: {
          trigger: ".box",
          start: "top center",
          end: "botton top",
          markers: true,
        },
      });
    </script>
  </body>
</html>
<!-- 
scrollTrigger는 gsap플러그인으로
스크롤을 기준으로 애니메이션을 할 수 있음

- trigger : 애니메이션을 시작할 요소(선택자)
- start, end : 스크롤 시작, 끝("top center")
    start : "top center"
    end : "botton top"
  ==> 요소(선택자)의 top부분, 브라우저의 center

- scrub : 스크롤에 맞춰 애니메이션을 부드럽게.  숫자가 클수록 부드러음. 1,2,3
- pin : 해당요소(선택자)를 스크롤 중에 고정
- markers : true를 하면 start, end가 보임



ease느낌
linear : 시작과 끝이 일정한 속도. 등속도 운동입니다. 처음부터 끝까지 똑같은 속도
power: 가속도 운동입니다. (보통 power1, power2, power3, power4 등으로 사용).
power1.out : 시작은 빠르고 서서히 멈춤
back: 되돌아옴 효과입니다. 목적지에 도착하기 직전에 목표 지점을 살짝 넘었다가 다시 제자리로 돌아옵니다. "탁" 걸리는 느낌을 줄 때 아주 좋습니다.
back.out : 끝에서 살짝 앞쪽으로 갔다가 복귀
back.out(2) :숫자가 클수록 더 멀리 갔다가 제자리로 돌아옴
elastic: 고무줄 효과
elastic.out :고무줄 튕기듯 여러번 흔들림
bounce: 통통 튀는 효과
bounce.out :공이 바닥에 튕기듯 멈춤

in : 천천히 시작하고 빠르게 끝남
out : 빠르게 시작하고 천천히 끝남
inout : 천천히 시작하고 천천히 끝남



  gsap.to()는 현재 상태에서 설정한 값으로 애니메이션이 실행(도착점 설정)
  gsap.from()은 설정한 시작값에서 현재 스타일로 자연스럽게 이동(출발점 설정)
  gsap.fromto()은 시작값(출발점)에서 끝값(도착점)까지 지정해서 애니메이션 실행(출발점, 도착점 설정해야함)

  <ease종류>
    - elastic : 튕기는 효과
    - bounce : 튕기는 효과
    - slow : 천천히 시작

    - out : 빠르게 시작하고 천천히 끝남
    - in : 천천히 시작하고 빠르게 끝남
    - inOut : 천천히 시작하고 천천히 끝남
    - stagger : 간격. 시차를 두고 순서대로 시작

    elastic.out
    elastic.in
    elastic.inOut

    위치관련 : x, y
    속성 : opacity, scale, scaleX, scaleY
    rotaion, skewX, skewY, backgroundColor, color, borderRadius, width, height

    duration : 진행시간
    delay : 지연시간

CSS로 완성된 모습을 그려놓습니다. from은 **"지금 CSS 상태를 도착점이라고 생각하고, 내가 지정한 과거 상태에서 여기까지 되돌아와라"**라고 명령하는 것입니다. 그래서 코드가 끝나면 결국 HTML/CSS로 디자인한 원래 위치에 딱 멈추게 됩니다.



-->
