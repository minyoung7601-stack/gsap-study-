<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>02실습 clip2</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 3000px;
    }
    .con01 {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    .con01 video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .con01 h2 {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 100px;
      text-align: center;
    }
  </style>
  <body>
    <section class="con01">
      <video src="KakaoTalk_20260420_124633442.mp4" autoplay loop muted></video>
      <h2>Creative<br />digital design</h2>
    </section>
    <script>
      gsap
        .timeline({
          scrollTrigger: {
            trigger: ".con01",
            start: "0%, 0%", // "top top"에서 시작해서 스크롤을 1000px 내릴 동안 애니메이션 진행
            end: "100% 90%",
            scrub: 1,
            pin: true, // 애니메이션이 일어나는 동안 화면을 고정시키면 훨씬 예쁩니다!
            markers: true,
          },
        })
        .fromTo(
          ".con01 video",
          { "clip-path": "inset(60% 60% 60% 60% round 30%)" },
          {
            "clip-path": "inset(0% 0% 0% 0% round 0%)",
          },
        );
    </script>
  </body>
</html>
