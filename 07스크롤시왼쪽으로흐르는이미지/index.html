<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>흐르는 이미지</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      ul {
        list-style: none;
      }
      section {
        height: 100vh;
      }
      .con02 {
        background-color: #000;
        color: #fff;
        padding: 100px;
        overflow: hidden;
      }
      .con02 .textBox {
        width: 80%;
        margin: 0 auto;
      }
      .con02 h2 {
        font-size: 5vw;
        color: orangered;
        letter-spacing: -5px;
        margin-bottom: 0.5rem;
      }

      .con02 ul {
        display: flex;
        margin: 100px 0px;
      }
      .con02 li {
        width: 400px;
        flex-shrink: 0;
      }
      .con02 img {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <section class="con01">스크롤을 해보세요</section>
    <section class="con02">
      <div class="textBox">
        <h2>요리 초보 가이드</h2>
        <p>요리 초보라면 ? 이것부터 보세요</p>
      </div>

      <ul>
        <li><img src="img/122807947wmxz.jpg" alt="" /></li>
        <li><img src="img/143484265gqnl.jpg" alt="" /></li>
        <li><img src="img/153833541fseo.jpg" alt="" /></li>
        <li><img src="img/154187882vjzy.jpg" alt="" /></li>
        <li><img src="img/156589176roxn.jpg" alt="" /></li>
        <li><img src="img/164393262axve.jpg" alt="" /></li>
        <li><img src="img/165922472eupo.jpg" alt="" /></li>
      </ul>
    </section>
    <section class="con03"></section>
    <script>
      let list = gsap.utils.toArray(".con02 li");
      console.log(list);
      gsap.to(list, {
        xPercent: -500, //x축으로 이동거리
        scrollTrigger: {
          trigger: ".con02",
          start: "top top",
          end: "+=2000",
          scrub: 2,
          pin: true,
          markers: true,
        },
      });
    </script>
  </body>
</html>
