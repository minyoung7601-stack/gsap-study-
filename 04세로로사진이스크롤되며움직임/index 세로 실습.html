<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>04실습 세로 2줄 이미지 제이쿼리활용</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery-simplyscroll/2.1.1/jquery.simplyscroll.min.js"
      integrity="sha512-i8BU+cmsrlyKOPFSCdO4x4wHXvjg6YIXy6K/PsPL0/3F89ccSgk06wDBP5FTyiGDzVNADQhal1dA1DHH2JB0Rw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      ul {
        list-style: none;
      }
      .wrap {
        width: 80%;
        margin: 50px auto;
        background: orange;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 50px 100px;
      }
      .txt h2 {
        color: #fff;
        font-size: 35px;
        white-space: nowrap;
      }
      .list {
        display: flex;
        gap: 20px;
      }
      .list01,
      .list02 {
        width: 200px;
      }

      .list01 li,
      .list02 li {
        width: 100%;
        height: 200px;
        filter: brightness(70%);
        flex-shrink: 0;
        margin: 0 auto;
      }

      /* 이미지 비율 유지 설정 */
      .list img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .simply-scroll-clip {
        width: 200px;
        height: 450px;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <section>
      <div class="wrap">
        <div class="txt">
          <h2>건강과 행복을 위한<br />새로운 여전의 시작</h2>
        </div>
        <div class="list">
          <ul class="list01">
            <li><img src="img/img01.jpg" alt="" /></li>
            <li><img src="img/img02.jpg" alt="" /></li>
            <li><img src="img/img03.jpg" alt="" /></li>
            <li><img src="img/img04.jpg" alt="" /></li>
            <li><img src="img/img05.jpg" alt="" /></li>
            <li><img src="img/img06.jpg" alt="" /></li>
            <li><img src="img/img07.jpg" alt="" /></li>
            <li><img src="img/img08.jpg" alt="" /></li>
          </ul>
          <ul class="list02">
            <li><img src="img/img01.jpg" alt="" /></li>
            <li><img src="img/img02.jpg" alt="" /></li>
            <li><img src="img/img03.jpg" alt="" /></li>
            <li><img src="img/img04.jpg" alt="" /></li>
            <li><img src="img/img05.jpg" alt="" /></li>
            <li><img src="img/img06.jpg" alt="" /></li>
            <li><img src="img/img07.jpg" alt="" /></li>
            <li><img src="img/img08.jpg" alt="" /></li>
          </ul>
        </div>
      </div>
    </section>
    <script>
      $(function () {
        //첫번째 리스트(역방향)
        $(".list01").simplyScroll({
          orientation: "vertical",
          speed: 1,
          direction: "backwards",
        });

        //두번째 리스트(정방향)
        $(".list02").simplyScroll({
          orientation: "vertical",
          speed: 1,
          direction: "forwards",
        });
      });
    </script>
  </body>
</html>
<!-- 
simplyScroll : 이미지 및 글자를 자동으로 흐르게 하는 플러그인
제이쿼리는 이런 플로그인이 많음

1. jquery cdn을 검색해서 연결하기
2. simplyscroo cdn 검색해서 연결하기 
3. 제이쿼리로 $(".list").simplyScroll();
  입력하면
  simply-scroll-clip 클래스가 생성됨
  speed: 1, 속도조절
  direction: "backwards", 방향조절
  pauseOnHover: false,  호버했을때 일시정지해제
  pauseOnTouch: false,  터치했을때 일시정지해제
  orientation: "vertical", 세로 방향으로 움직임
-->
