<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01실습반응형</title>
    <link rel="stylesheet" href="style반응형2.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <div id="container">
      <section class="con01">
        <h2>section</h2>
        <ul>
          <li class="card01">Card1</li>
          <li class="card02">Card2</li>
          <li class="card03">Card3</li>
          <li class="card04">Card4</li>
          <li class="card05">Card5</li>
        </ul>
      </section>
      <section class="con02">
        <h2>section02</h2>
        <ul>
          <li>Card1</li>
          <li>Card2</li>
          <li>Card3</li>
          <li>Card4</li>
        </ul>
      </section>
    </div>
    <script>
      //pc, 태블릿 - con01
      if (window.innerWidth >= 768) {
        gsap
          .timeline({
            scrollTrigger: {
              trigger: ".con01",
              start: "100% 90%",
              end: "100% 10%",
              scrub: 2, //scrub은 스크롤의 길이에 따라 움직임이 조절됨
              pin: true,
              markers: true,
            },
          })
          //y값을 from에, to에는 opacity:1
          .fromTo(
            ".con01 .card01",
            { y: 400, opacity: 0 }, // 여기! 시작할 때의 투명도를 0으로 설정
            { y: 0, opacity: 1 }, // 끝날 때의 투명도를 1로 설정
          )
          // card02 시작 (마지막에 숫자 0.2는 앞선 애니메이션 시작 후 0.2초 뒤에 실행하라는 뜻)
          .fromTo(
            ".con01 .card02",
            { y: 400, opacity: 0 },
            { y: 0, opacity: 1 },
          )

          // card03 시작
          .fromTo(
            ".con01 .card03",
            { y: 400, opacity: 0 },
            { y: 0, opacity: 1 },
          )

          // card04 시작
          .fromTo(
            ".con01 .card04",
            { y: 400, opacity: 0 },
            { y: 0, opacity: 1 },
          )

          // card05 시작
          .fromTo(
            ".con01 .card05",
            { y: 400, opacity: 0 },
            { y: 0, opacity: 1 },
          );
      }

      //모바일 - con01
      if (window.innerWidth < 768) {
        gsap
          .timeline({
            scrollTrigger: {
              trigger: ".con01 ul",
              start: "top 80%", // 카드의 상단이 화면 80% 지점에 오면 시작
              end: "bottom 20%",
              scrub: 2,
              // markers: true, // 위치 확인이 필요할 때 켜주세요
            },
          })
          /* 카드가 2개씩 배치되므로, 살짝 시차를 두고 올라오게 설정 */
          .to(".con01 .card01", { y: 0, opacity: 1 }, 0.1)
          .to(".con01 .card02", { y: 0, opacity: 1 }, 0.2)
          .to(".con01 .card03", { y: 0, opacity: 1 }, 0.3)
          .to(".con01 .card04", { y: 0, opacity: 1 }, 0.4)
          .to(".con01 .card05", { y: 0, opacity: 1 }, 0.5);
      }

      gsap
        .timeline({
          scrollTrigger: {
            trigger: ".con02 ul", // 이 요소가 화면에 보일 때 애니메이션 준비!
            start: "top 90%",
            end: "20% 30%",
            scrub: 2,
            // markers: true,
          },
        })

        .to(".con02 li:nth-child(1)", { y: 0, duration: 1 }, 0.2)
        .to(".con02 li:nth-child(2)", { y: 0, duration: 1 }, 0.4)
        .to(".con02 li:nth-child(3)", { y: 0, duration: 1 }, 0.6)
        .to(".con02 li:nth-child(4)", { y: 0, duration: 1 }, 0.8);
    </script>
  </body>
</html>
