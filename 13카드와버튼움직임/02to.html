<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to도착점 설정</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: orange;
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
    <script>
      gsap.to(".box", {
        x: 400,
        // y: 500,
        opacity: 1,
        duration: 5,
        ease: "bounce.out",
        ease: "elastic.out",
        backgroundColor: "red",
        scale: 2,
        rotation: 360,
        borderRadius: "50%",
      });
    </script>
  </body>
</html>
