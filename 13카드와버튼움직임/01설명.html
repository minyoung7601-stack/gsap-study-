<!-- 
gsap은 웹에서 부드럽고 성능 좋은 애니메이션을 만들어주는 자바스크립트 라이브러리
  - 빠르고 부드러운 애니메이션 지원
  - 코드가 간결하고 직관적임
  - 다양한 브라우저와 호완

  gsap.to()는 현재 상태에서 설정한 값으로 애니메이션이 실행(도착점 설정)
  gsap.from()은 설정한 시작값에서 현재 스타일로 자연스럽게 이동(출발점 설정)
  gsap.fromto()은 시작값(출발점)에서 끝값(도착점)까지 지정해서 애니메이션 실행(출발점, 도착점 설정해야함)

  <ease종류>
    - elastic : 튕기는 효과
    - bounce : 튕기는 효과
    - slow : 천천히 시작

    - out : 빠르게 시작하고 천천히 끝남
    - in : 천천히 시작하고 빠르게 끝남
    - inOut : 천천히 시작하고 천천히 끝남

    elastic.out
    elastic.in
    elastic.inOut

    위치관련 : x, y
    속성 : opacity, scale, scaleX, scaleY
    rotaion, skewX, skewY, backgroundColor, color, borderRadius, width, height

    duration : 진행시간
    delay : 지연시간
-->
