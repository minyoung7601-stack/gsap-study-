<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고정실습</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
      }
      ul {
        list-style: none;
      }
      body {
        height: 3000px;
        background-color: #ddd;
      }
      section {
        height: 100vh;
      }
      #section01 {
        background-color: pink;
      }
      #section02 {
        background-color: lightblue;
        overflow: hidden;
      }
      #section03 {
        background-color: yellowgreen;
      }
      #section02 div {
        display: flex;
        justify-content: center;
        gap: 10rem;
        align-items: flex-start;
        padding-top: 100px;
      }

      #section02 img {
        width: 300px;
      }
      #section02 ul {
        display: flex;
        flex-direction: column;
        gap: 20px;
        border: 1px solid red;
      }

      #section02 li {
        width: 300px;
        height: 300px;
        background-color: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <section id="section01">section01</section>
    <section id="section02">
      <div>
        <img src="img/pic1.jpg" alt="" />
        <ul>
          <li>박스1</li>
          <li>박스2</li>
          <li>박스3</li>
          <li>박스4</li>
          <li>박스5</li>
          <li>박스6</li>
        </ul>
      </div>
    </section>
    <section id="section03">section01</section>
    <script>
      gsap.to("ul", {
        y: -1200, //y값을 조절해서 ul안에 있는 내용이 다 보이게 만들어야함. 내용이 많으면 y를 크게 입력함.y 값을 바꿔준다
        scrollTrigger: {
          trigger: "#section02",
          start: "top top",
          end: "+=5000", //고정을 더 길게 하고 싶을때 사용
          scrub: 2,
          pin: true,
          markers: true,
        },
      });
    </script>
  </body>
</html>

<!-- 
display:flex : 기본적으로 가로로 배치됨.
justify-content: center => 가로로 가운데.
align-items : center => 세로로 가운데

display:flex
flex-direction: column ==> 세로로 배치
justify-content: center => 세로로 가운데.
align-items : center => 가로로 가운데

display:flex로 배치를 하면
크기에 영향을 받음
영향을 안받으려면 
align-items: flex-start;
-->
