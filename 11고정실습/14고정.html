<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고정</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/ScrollTrigger.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      section {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2rem;
      }
      .box1 {
        background-color: green;
      }
      .box2 {
        background-color: orange;
      }
      .box3 {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="box1">section01</section>
      <section class="box2">section02</section>
      <section class="box3">section03</section>
    </div>
    <script>
      gsap.to(".box2", {
        scrollTrigger: {
          trigger: ".box2",
          start: "top top",
          pin: true,
          markers: true,
        },
      });
    </script>
  </body>
</html>
